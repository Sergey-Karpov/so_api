services:
  - type: web
    name: sales-prediction-api
    runtime: python310
    repo: https://github.com/Sergey-Karpov/so_api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0